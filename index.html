<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>비밀정원 🌸 꽃 도감</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" as="style" crossorigin
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.css" />
</head>
<body class="locked">
  <div id="login-screen" class="login-screen">
    <div class="login-card">
      <h1>비밀정원 <span class="emoji">🌸</span></h1>
      <p class="login-sub">길드 비밀번호를 입력하세요</p>
      <input id="login-pw" type="password" placeholder="비밀번호" autocomplete="current-password" />
      <button id="login-btn" class="primary">입장하기</button>
      <p id="login-msg" class="login-msg" aria-live="polite"></p>
    </div>
  </div>

  <header class="site-header">
    <h1>비밀정원 <span class="emoji">🌸</span></h1>
    <nav class="tabs">
      <button id="tab-view" class="tab active" data-view="view">꽃 보기</button>
      <button id="tab-input" class="tab" data-view="input">내 꽃 입력</button>
    </nav>
    <div class="backup">
      <button id="export-btn" class="ghost">백업 내보내기</button>
      <button id="logout-btn" class="ghost">로그아웃</button>
    </div>
  </header>

  <main>
    <section id="view-screen" class="screen active"></section>
    <section id="input-screen" class="screen"></section>
  </main>

  <script type="module" src="js/app.js"></script>
</body>
</html>
