<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>비밀정원 🌸 꽃 도감</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" as="style" crossorigin
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.css" />
</head>
<body>
  <header class="site-header">
    <h1>비밀정원 <span class="emoji">🌸</span></h1>
    <nav class="tabs">
      <button id="tab-view" class="tab active" data-view="view">꽃 보기</button>
      <button id="tab-input" class="tab" data-view="input">내 꽃 입력</button>
    </nav>
    <div class="backup">
      <button id="image-btn" class="ghost">🖼 이미지 저장</button>
      <button id="share-btn" class="ghost">🔗 공유 링크</button>
      <button id="export-btn" class="ghost">백업 내보내기</button>
      <label class="ghost import-label">
        불러오기
        <input id="import-file" type="file" accept="application/json" hidden />
      </label>
    </div>
    <p id="shared-banner" class="shared-banner">🌸 공유받은 꽃 보기 (읽기 전용)</p>
  </header>

  <main>
    <section id="view-screen" class="screen active"></section>
    <section id="input-screen" class="screen"></section>
  </main>

  <script type="module" src="js/app.js"></script>
</body>
</html>
